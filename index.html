<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodega La Barata - v2</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; text-align: center; }
        header { padding: 30px 20px; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .contenedor { max-width: 500px; margin: 0 auto; padding: 20px; }
        .boton-app { display: inline-block; background-color: #2ed573; color: white; padding: 15px 30px; font-size: 18px; font-weight: bold; text-decoration: none; border-radius: 30px; box-shadow: 0 4px 10px rgba(46, 213, 115, 0.3); margin-top: 30px; transition: transform 0.2s; }
        .boton-app:active { transform: scale(0.95); }
        p { color: #555; line-height: 1.6; }
    </style>
</head>
<body>

    <header>
        <h1>Bodega La Barata</h1>
        <p>Inventario y Precios Digitales</p>
    </header>

    <div class="contenedor">
        <h2>¡Tu inventario está listo!</h2>
        <p>Para añadir productos, cambiar precios con un toque y que tus clientes lo vean todo ordenado como una aplicación real en su teléfono, haz clic abajo:</p>
        
        <!-- Enlace directo para abrir la app oficial desde tu hoja de Google Sheets -->
        <a href="https://appsheet.com" target="_blank" class="boton-app">📱 Abrir Mi Bodega Digital</a>
    </div>

</body>
</html>

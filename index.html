<!DOCTYPE html>
<html lang="es" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodega La Barata</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 0; background: #f8f9fa; color: #2d3748; padding-bottom: 80px; }
        header { text-align: center; padding: 25px 20px; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; border-radius: 0 0 20px 20px; }
        header h1 { margin: 0; font-size: 26px; }
        .contenedor { max-width: 600px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .seccion-pagos { background: white; padding: 15px; border-radius: 16px; border: 1px solid #edf2f7; margin-bottom: 20px; }
        .tag-pago { background: #edf2f7; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-right: 5px; }
        .datos-pago-movil { background: #f7fafc; border-left: 4px solid #2a5298; padding: 10px; margin-top: 10px; font-size: 13px; border-radius: 0 8px 8px 0; }
        .buscador { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #edf2f7; border-radius: 30px; box-sizing: border-box; font-size: 16px; outline: none; }
        .grid-productos { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .producto-card { background: white; padding: 15px; border-radius: 16px; border: 1px solid #edf2f7; position: relative; display: flex; flex-direction: column; justify-content: space-between; }
        .producto-card.tarjeta-agotado { opacity: 0.55; background: #fff5f5; border-color: #fed7d7; }
        .badge-agotado { display: none; background: #e53e3e; color: white; font-size: 9px; font-weight: bold; padding: 2px 6px; border-radius: 4px; position: absolute; top: 10px; right: 10px; }
        .producto-card.tarjeta-agotado .badge-agotado { display: block; }
        .linea-dato { font-size: 14px; margin-bottom: 5px; }
        .precio-bloque { margin-top: 10px; background: #e8fbf1; padding: 5px 10px; border-radius: 20px; display: inline-block; text-align: center; }
        .producto-card.tarjeta-agotado .precio-bloque { background: #fee2e2; }
        .precio-texto { font-weight: bold; color: #2ed573; font-size: 16px; }
        .producto-card.tarjeta-agotado .precio-texto { color: #e53e3e; }
        
        /* Botón Añadir al Carrito */
        .btn-agregar-carrito { width: 100%; background: #2a5298; color: white; border: none; padding: 8px; margin-top: 10px; border-radius: 20px; font-weight: bold; font-size: 12px; cursor: pointer; transition: background 0.2s; }
        .btn-agregar-carrito:hover { background: #1e3c72; }
        .producto-card.tarjeta-agotado .btn-agregar-carrito { display: none; }

        /* Barra Fija Inferior del Carrito */
        .barra-carrito-fija { position: fixed; bottom: 0; left: 0; right: 0; background: white; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-radius: 20px 20px 0 0; }
        .info-carrito-fijo { font-size: 15px; font-weight: bold; color: #2d3748; }
        .btn-ver-pedido { background: #2ed573; color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 14px; }

        /* Ventana Emergente del Carrito */
        .modal-carrito { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: flex-end; }
        .contenido-modal { background: white; width: 100%; max-width: 600px; border-radius: 25px 25px 0 0; padding: 25px; box-sizing: border-box; max-height: 85vh; overflow-y: auto; }
        .item-carrito { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #edf2f7; }
        .controles-cantidad { display: flex; align-items: center; gap: 8px; }
        .btn-cant { background: #edf2f7; border: none; width: 26px; height: 26px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        
        .panel-admin { background: white; padding: 20px; border-radius: 16px; border: 1px dashed #2a5298; display: none; margin-top: 20px; }
        .form-control { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; background: #2a5298; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-bloqueo { display: block; width: 100%; text-align: center; color: #a0aec0; font-size: 13px; margin: 20px 0; text-decoration: underline; background: none; border: none; cursor: pointer; }
        .btn-borrar { position: absolute; top: 8px; right: 8px; background: #ff4757; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 11px; cursor: pointer; display: none; z-index: 10; }
        .loading-text { text-align: center; color: #718096; padding: 20px; grid-column: 1/-1; }
    </style>
</head>
<body>

    <header>
        <h1>Bodega La Barata</h1>
        <p>Precios y Disponibilidad en Tiempo Real</p>
    </header>

    <div class="contenedor">
        <div class="seccion-pagos">
            <h3 style="margin:0 0 10px 0; font-size:14px; color:#1e3c72;">💳 MÉTODOS DE PAGO</h3>
            <span class="tag-pago">🔵 Biopago</span>
            <span class="tag-pago">💵 Efectivo</span>
            <span class="tag-pago">📱 Pago Móvil</span>
            <div class="datos-pago-movil">
                <strong>Datos de Pago Móvil:</strong><br>
                🏦 Banco Venezuela (0102)<br>
                📞 Teléfono: 04141207012<br>
                🆔 C.I: 27283211
            </div>
        </div>

        <input type="text" id="buscar" class="buscador" placeholder="🔍 Buscar producto..." oninput="filtrarProductos()">

        <div class="grid-productos" id="lista-productos">
            <div class="loading-text" id="cargando-aviso">Cargando inventario de la nube...</div>
        </div>

        <button class="btn-bloqueo" id="btn-entrar" onclick="verificarAcceso()">⚙️ Acceso Administrador</button>

        <div class="panel-admin" id="admin-section">
            <h2 style="margin:0 0 10px 0; font-size:16px;">⚙️ Panel de Inventario Nube</h2>
            <input type="text" id="prod-nombre" class="form-control" placeholder="Nombre del Producto">
            <input type="text" id="prod-presentacion" class="form-control" placeholder="Disponibilidad (Ej: Kilo / Agotado)">
            <input type="number" id="prod-precio" class="form-control" placeholder="Precio (Bs.)" step="0.01">
            <button class="btn" id="btn-guardar-prod" onclick="agregarOEditarProducto()">💾 Guardar Producto en la Nube</button>
            <button class="btn" style="background:#718096; margin-top:5px;" onclick="cerrarPanel()">🔒 Cerrar Sesión</button>
        </div>
    </div>

    <div class="barra-carrito-fija" id="barra-carrito" style="display: none;">
        <div class="info-carrito-fijo">
            🛒 <span id="cant-items-fijo">0</span> prod. | <span id="total-fijo" style="color:#2ed573;">0.00</span> Bs.
        </div>
        <button class="btn-ver-pedido" onclick="abrirModalCarrito()">📋 Ver Pedido</button>
    </div>

    <div class="modal-carrito" id="modal-carrito" onclick="cerrarModalCarritoExtern(event)">
        <div class="contenido-modal">
            <h3 style="margin-top:0; color:#1e3c72; border-bottom:2px solid #edf2f7; padding-bottom:10px; display:flex; justify-content:space-between;">
                <span>📋 Tu Pedido</span>
                <span style="cursor:pointer; color:#718096;" onclick="cerrarModalCarrito()">✕</span>
            </h3>
            
            <div id="lista-items-carrito" style="margin: 1

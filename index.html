<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de mi Bodega</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; color: #333; }
        header { text-align: center; padding: 10px 0; background: #2c3e50; color: white; border-radius: 8px; margin-bottom: 20px; }
        .buscador { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 25px; box-sizing: border-box; font-size: 16px; }
        .grid-productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .producto-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .precio { font-weight: bold; color: #27ae60; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>Mi Bodega Ecológica</h1>
        <p>Productos disponibles en tiempo real</p>
    </header>

    <input type="text" id="buscar" class="buscador" placeholder="Buscar producto..." onkeyup="filtrarProductos()">

    <div class="grid-productos" id="lista-productos">
        <div class="producto-card">
            <h3>Manzanas Orgánicas</h3>
            <p>Por Kilogramo</p>
            <div class="precio">$3.50</div>
        </div>
        <div class="producto-card">
            <h3>Arroz Integral</h3>
            <p>Bolsa 1kg</p>
            <div class="precio">$2.20</div>
        </div>
        <div class="producto-card">
            <h3>Aceite de Oliva</h3>
            <p>Botella 500ml</p>
            <div class="precio">$8.90</div>
        </div>
    </div>

    <script>
        function filtrarProductos() {
            let input = document.getElementById('buscar').value.toLowerCase();
            let cards = document.getElementsByClassName('producto-card');
            for (let i = 0; i < cards.length; i++) {
                let nombre = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
                if (nombre.includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
